name: proje_haritasi_mobile
description: ProjeHaritası — Endüstriyel Otomasyon & MES Proje Yönetimi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.0
  provider: ^6.1.2
  flutter_svg: ^2.0.10
  xml: ^6.5.0
  intl: ^0.20.2
  path_drawing: ^1.0.1

  # Offline & connectivity
  sqflite: ^2.3.3
  connectivity_plus: ^6.1.4
  path: ^1.9.0

  # GPS & camera
  geolocator: ^13.0.2
  image_picker: ^1.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/turkiye.svg
